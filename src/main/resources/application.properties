spring.application.name=brew-crm
server.port=8081
server.servlet.context-path=/brew-crm

# MySQL (실제 값은 application-local.properties 또는 환경변수로 설정)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/brewcrm?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# MyBatis (member.vo 패키지 추가)
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=org.study.brewcrm.customer.vo,org.study.brewcrm.member.vo,org.study.brewcrm.board.vo,org.study.brewcrm.order.vo
# visit_count→visitCount, reg_date→regDate 등 snake_case 자동 camelCase 변환
mybatis.configuration.map-underscore-to-camel-case=true

# JSP
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# 에러 응답에 메시지·stacktrace 포함 (진단용 — 운영에서는 never 권장)
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true
logging.file.name=logs/brewcrm.log
logging.level.org.study.brewcrm=DEBUG
logging.level.org.springframework.web=DEBUG

# 인코딩
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
